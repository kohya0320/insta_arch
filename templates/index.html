<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Architecture Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #080808; color: #fff; min-height: 100vh; }

    header { padding: 32px 20px 24px; text-align: center; border-bottom: 1px solid #1a1a1a; }
    header h1 { font-size: 20px; font-weight: 300; letter-spacing: 6px; color: #c9a84c; text-transform: uppercase; }
    header p { font-size: 11px; color: #555; margin-top: 6px; letter-spacing: 2px; }

    .main { max-width: 1100px; margin: 0 auto; padding: 36px 16px 80px; }

    .gen-wrap { text-align: center; margin-bottom: 40px; }
    .generate-btn {
      display: inline-block; padding: 15px 48px;
      background: transparent; color: #c9a84c;
      border: 1px solid #c9a84c; border-radius: 2px;
      font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .generate-btn:hover { background: #c9a84c; color: #080808; }
    .generate-btn:disabled { border-color: #333; color: #444; cursor: default; background: transparent; }

    .progress { text-align: center; margin-bottom: 24px; display: none; }
    .progress-bar-wrap { width: 280px; height: 2px; background: #222; margin: 14px auto 6px; }
    .progress-bar { height: 2px; background: #c9a84c; width: 0%; transition: width 0.8s; }
    .progress p { font-size: 11px; color: #555; letter-spacing: 2px; }
    .progress-eta { font-size: 11px; color: #444; margin-top: 4px; letter-spacing: 1px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 40px;
      min-height: 0;
    }
    @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card {
      cursor: pointer; position: relative; overflow: hidden;
      border: 1px solid #1a1a1a; transition: all 0.25s;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .card:hover { border-color: #c9a84c; }
    .card.selected { border-color: #c9a84c; box-shadow: 0 0 0 1px #c9a84c; }
    .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }
    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      opacity: 0; transition: opacity 0.25s;
    }
    .card:hover .card-overlay, .card.selected .card-overlay { opacity: 1; }
    .card-name { font-size: 10px; color: #c9a84c; letter-spacing: 1px; text-transform: uppercase; }
    .selected-badge {
      position: absolute; top: 8px; right: 8px;
      background: #c9a84c; color: #080808;
      font-size: 9px; font-weight: 700; padding: 3px 8px;
      letter-spacing: 1px; display: none;
    }
    .card.selected .selected-badge { display: block; }

    .post-area {
      display: none; background: #0e0e0e;
      border: 1px solid #1a1a1a; padding: 28px; margin-top: 8px;
    }
    .post-area h2 { font-size: 11px; letter-spacing: 3px; color: #c9a84c; text-transform: uppercase; margin-bottom: 20px; }
    .selected-preview { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
    .selected-preview img { width: 100px; aspect-ratio: 4/5; object-fit: cover; flex-shrink: 0; }
    .preview-name { font-size: 13px; color: #c9a84c; margin-bottom: 10px; }
    label { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 8px; }
    .caption-box {
      width: 100%; background: #080808; border: 1px solid #222;
      padding: 14px; color: #ddd; font-size: 13px; line-height: 1.7;
      min-height: 110px; resize: vertical; font-family: inherit;
    }
    .caption-box:focus { outline: none; border-color: #c9a84c; }
    .action-btns { display: flex; gap: 12px; margin-top: 16px; }
    .expand-btn {
      flex: 1; padding: 14px;
      background: transparent; color: #c9a84c;
      border: 1px solid #c9a84c; font-size: 11px;
      font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .expand-btn:hover { background: #c9a84c; color: #080808; }
    .expand-btn:disabled { border-color: #333; color: #444; cursor: default; background: transparent; }
    .post-btn {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff; border: none; font-size: 11px;
      font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s;
    }
    .post-btn:hover { opacity: 0.88; }
    .post-btn:disabled { background: #222; color: #555; cursor: default; }
    .result-msg { margin-top: 12px; font-size: 12px; text-align: center; }
    .result-msg.ok { color: #4ade80; }
    .result-msg.err { color: #f87171; }

    /* 12 views section */
    .views-section { display: none; margin-top: 40px; }
    .views-section h2 { font-size: 11px; letter-spacing: 3px; color: #c9a84c; text-transform: uppercase; margin-bottom: 20px; }
    .views-progress { text-align: center; margin-bottom: 20px; }
    .views-progress p { font-size: 11px; color: #555; letter-spacing: 2px; }
    .views-progress-bar-wrap { width: 280px; height: 2px; background: #222; margin: 12px auto 6px; }
    .views-progress-bar { height: 2px; background: #c9a84c; width: 0%; transition: width 0.8s; }
    .views-eta { font-size: 11px; color: #444; margin-top: 4px; letter-spacing: 1px; text-align: center; }
    .views-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 800px) { .views-grid { grid-template-columns: repeat(2, 1fr); } }

    .view-card {
      position: relative; overflow: hidden; cursor: pointer;
      border: 2px solid #1a1a1a;
      animation: fadeIn 0.4s ease;
      transition: all 0.2s;
      user-select: none;
    }
    .view-card:hover { border-color: #555; }
    .view-card.selected { border-color: #c9a84c; box-shadow: 0 0 0 1px #c9a84c; }
    .view-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }
    .view-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 8px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .view-card-name { font-size: 9px; color: #c9a84c; letter-spacing: 1px; text-transform: uppercase; }
    .view-badge {
      position: absolute; top: 7px; left: 7px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #c9a84c; color: #080808;
      font-size: 11px; font-weight: 800;
      display: none; align-items: center; justify-content: center;
    }
    .view-card.selected .view-badge { display: flex; }
    .view-dblclick-hint {
      position: absolute; top: 7px; right: 7px;
      background: rgba(0,0,0,0.5); color: #888;
      font-size: 8px; padding: 2px 5px; letter-spacing: 1px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .view-card:hover .view-dblclick-hint { opacity: 1; }

    /* Saved strip */
    .saved-strip { margin-bottom: 24px; }
    .saved-strip-header { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    @media (max-width: 800px) { .saved-grid { grid-template-columns: repeat(3, 1fr); } }
    .saved-card {
      position: relative; overflow: hidden;
      border: 1px solid #2a2a2a;
      animation: fadeIn 0.3s ease;
    }
    .saved-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }
    .saved-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px 6px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .saved-card-name { font-size: 8px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .saved-pin {
      position: absolute; top: 5px; left: 5px;
      background: #2a2a2a; color: #888; font-size: 8px;
      padding: 2px 5px; letter-spacing: 1px;
    }
    .saved-card { cursor: pointer; transition: all 0.2s; }
    .saved-card.selected { border-color: #c9a84c; box-shadow: 0 0 0 1px #c9a84c; }
    .saved-card.selected .saved-pin { background: #c9a84c; color: #080808; font-weight: 700; }

    /* Views action bar */
    .views-action-bar {
      display: none;
      background: #0e0e0e; border: 1px solid #1a1a1a;
      padding: 16px 20px; margin-top: 16px;
      align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .views-action-bar.visible { display: flex; }
    .views-sel-info { font-size: 11px; color: #888; letter-spacing: 1px; flex: 1; }
    .views-sel-info span { color: #c9a84c; font-weight: 700; }
    .regen-btn {
      padding: 12px 24px;
      background: transparent; color: #888;
      border: 1px solid #333; font-size: 10px;
      font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .regen-btn:hover { border-color: #888; color: #ccc; }
    .regen-btn:disabled { opacity: 0.4; cursor: default; }
    .post-views-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff; border: none; font-size: 10px;
      font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s;
    }
    .post-views-btn:hover { opacity: 0.88; }
    .post-views-btn:disabled { background: #222; color: #555; cursor: default; }
    .views-result-msg { width: 100%; text-align: center; font-size: 12px; margin-top: 4px; }
    .views-result-msg.ok { color: #4ade80; }
    .views-result-msg.err { color: #f87171; }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.93); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-img { max-height: 90vh; max-width: 90vw; object-fit: contain; display: block; }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      font-size: 28px; color: #c9a84c; cursor: pointer; line-height: 1;
      background: none; border: none;
    }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #c9a84c;
      font-size: 36px; cursor: pointer; padding: 16px; line-height: 1;
    }
    .lightbox-prev { left: 8px; }
    .lightbox-next { right: 8px; }
    .lightbox-label {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase;
    }
  </style>
</head>
<body>

<header>
  <h1>AI Architecture Studio</h1>
  <p>Generate · Select · Explore · Post to Instagram</p>
</header>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-label" id="lightbox-label"></div>
</div>

<div class="main">
  <div class="gen-wrap">
    <button class="generate-btn" id="gen-btn" onclick="generate()">Generate 5 Options</button>
  </div>

  <div class="progress" id="progress">
    <p id="progress-text">Generating image 1 / 5…</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-eta" id="progress-eta"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="post-area" id="post-area">
    <h2>Selected</h2>
    <div class="selected-preview">
      <div style="flex:1">
        <div class="preview-name" id="preview-name"></div>
        <label>Caption (editable)</label>
        <textarea class="caption-box" id="caption-box"></textarea>
      </div>
    </div>
    <div class="action-btns">
      <button class="expand-btn" id="expand-btn" onclick="generateViews()">Generate 12 Views</button>
      <button class="post-btn" id="post-btn" onclick="postToInstagram()">Post to Instagram</button>
    </div>
    <div class="result-msg" id="result-msg"></div>
  </div>

  <!-- 12 views section -->
  <div class="views-section" id="views-section">
    <h2 id="views-title">12 Views of Selected Building</h2>

    <!-- Saved strip (shown after first regenerate) -->
    <div class="saved-strip" id="saved-strip" style="display:none">
      <div class="saved-strip-header">Saved images</div>
      <div class="saved-grid" id="saved-grid"></div>
    </div>

    <div class="views-progress" id="views-progress">
      <p id="views-progress-text">Generating view 1 / 12…</p>
      <div class="views-progress-bar-wrap"><div class="views-progress-bar" id="views-progress-bar"></div></div>
      <div class="views-eta" id="views-eta"></div>
    </div>
    <div class="views-grid" id="views-grid"></div>

    <!-- Action bar: appears when ≥1 view selected -->
    <div class="views-action-bar" id="views-action-bar">
      <div class="views-sel-info" id="views-sel-info"><span id="sel-count">0</span> selected — tap to select/deselect, first = cover</div>
      <button class="regen-btn" id="regen-btn" onclick="regenerateViews()">Regenerate</button>
      <button class="post-views-btn" id="post-views-btn" onclick="postViewsToInstagram()">Post to Instagram</button>
      <div class="views-result-msg" id="views-result-msg"></div>
    </div>
  </div>
</div>

<script>
  let selectedOption = null;
  let pollInterval = null;
  let timerInterval = null;
  let shownImages = new Set();
  let jobStartTime = null;

  // expand job
  let expandPollInterval = null;
  let expandTimerInterval = null;
  let shownViewImages = new Set();
  let lastExpandData = null;

  // view selection
  let selectedViewImages = []; // [{image, style, src}] ordered by selection
  let savedViewImages = [];    // permanently saved across regenerates

  // lightbox
  let lightboxImages = []; // [{src, label}]
  let lightboxIndex = 0;

  function openLightbox(images, index) {
    lightboxImages = images;
    lightboxIndex = index;
    showLightboxAt(index);
    document.getElementById('lightbox').classList.add('open');
  }
  function showLightboxAt(i) {
    lightboxIndex = (i + lightboxImages.length) % lightboxImages.length;
    document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex].src;
    document.getElementById('lightbox-label').textContent = lightboxImages[lightboxIndex].label;
  }
  function lightboxNav(dir) { showLightboxAt(lightboxIndex + dir); }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  function closeLightboxOutside(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
    if (e.key === 'Escape') closeLightbox();
  });

  async function generate() {
    const btn = document.getElementById('gen-btn');
    const progress = document.getElementById('progress');
    const grid = document.getElementById('grid');
    const postArea = document.getElementById('post-area');
    const viewsSection = document.getElementById('views-section');

    btn.disabled = true;
    btn.textContent = 'Generating…';
    progress.style.display = 'block';
    grid.innerHTML = '';
    postArea.style.display = 'none';
    viewsSection.style.display = 'none';
    selectedOption = null;
    shownImages.clear();
    mainImages = [];
    jobStartTime = Date.now();

    if (pollInterval) clearInterval(pollInterval);
    if (timerInterval) clearInterval(timerInterval);
    if (expandPollInterval) clearInterval(expandPollInterval);
    if (expandTimerInterval) clearInterval(expandTimerInterval);

    const res = await fetch('/api/generate', { method: 'POST' });
    const { job_id } = await res.json();

    let lastData = null;

    timerInterval = setInterval(() => {
      if (lastData) updateETA(lastData, 5, 'progress-eta');
    }, 1000);

    pollInterval = setInterval(async () => {
      const r = await fetch(`/api/status/${job_id}`);
      const data = await r.json();
      lastData = data;

      data.results.forEach(opt => {
        if (!shownImages.has(opt.image)) {
          shownImages.add(opt.image);
          addCard(opt);
        }
      });

      const cur = data.current || Math.max(shownImages.size, 1);
      document.getElementById('progress-text').textContent = `Generating image ${cur} / 5…`;
      document.getElementById('progress-bar').style.width = `${data.count * 20}%`;
      updateETA(data, 5, 'progress-eta');

      if (data.status === 'done') {
        clearInterval(pollInterval);
        clearInterval(timerInterval);
        progress.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Generate 5 New Options';
      }
    }, 3000);
  }

  function updateETA(data, total, etaId) {
    const eta = document.getElementById(etaId);
    const done = data.count || 0;
    const avg = data.avg_duration > 0 ? data.avg_duration : 90;
    const remaining = total - done;
    if (remaining <= 0) { eta.textContent = ''; return; }

    const serverStart = data.started_at;
    const elapsed = serverStart ? (Date.now() / 1000 - serverStart) : 0;
    const currentImageElapsed = elapsed - (done * avg);
    const currentImageRemaining = Math.max(0, avg - currentImageElapsed);
    const totalRemaining = currentImageRemaining + (remaining - 1) * avg;

    if (totalRemaining > 0) {
      const mins = Math.floor(totalRemaining / 60);
      const secs = Math.floor(totalRemaining % 60);
      eta.textContent = mins > 0 ? `残り約 ${mins}分 ${secs}秒` : `残り約 ${secs}秒`;
    }
  }

  let mainImages = [];

  function addCard(opt) {
    const grid = document.getElementById('grid');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="/static/images/${opt.image}" alt="${opt.style}">
      <div class="card-overlay">
        <div class="card-name">${opt.style}</div>
      </div>
      <div class="selected-badge">✓ Selected</div>`;
    const idx = mainImages.length;
    mainImages.push({ src: '/static/images/' + opt.image, label: opt.style });
    card.onclick = () => selectOption(card, opt);
    card.ondblclick = (e) => { e.stopPropagation(); openLightbox(mainImages, idx); };
    grid.appendChild(card);
  }

  function selectOption(card, opt) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedOption = opt;
    document.getElementById('preview-name').textContent = opt.style;
    document.getElementById('caption-box').value = opt.caption;
    document.getElementById('result-msg').textContent = '';
    document.getElementById('expand-btn').disabled = false;
    document.getElementById('expand-btn').textContent = 'Generate 12 Views';
    const postArea = document.getElementById('post-area');
    postArea.style.display = 'block';
    postArea.scrollIntoView({ behavior: 'smooth' });
  }

  async function generateViews() {
    if (!selectedOption) return;
    const btn = document.getElementById('expand-btn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    const viewsSection = document.getElementById('views-section');
    const viewsGrid = document.getElementById('views-grid');
    const viewsProgress = document.getElementById('views-progress');
    viewsSection.style.display = 'block';
    viewsGrid.innerHTML = '';
    shownViewImages.clear();
    viewImages = [];
    selectedViewImages = [];
    updateViewActionBar();
    viewsProgress.style.display = 'block';
    document.getElementById('views-progress-bar').style.width = '0%';
    document.getElementById('views-eta').textContent = '';
    document.getElementById('views-title').textContent = '12 Views of Selected Building';
    document.getElementById('views-result-msg').textContent = '';
    viewsSection.scrollIntoView({ behavior: 'smooth' });

    if (expandPollInterval) clearInterval(expandPollInterval);
    if (expandTimerInterval) clearInterval(expandTimerInterval);

    const res = await fetch('/api/expand', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: selectedOption.prompt })
    });
    const { job_id, total } = await res.json();

    expandTimerInterval = setInterval(() => {
      if (lastExpandData) updateETA(lastExpandData, total, 'views-eta');
    }, 1000);

    expandPollInterval = setInterval(async () => {
      const r = await fetch(`/api/status/${job_id}`);
      const data = await r.json();
      lastExpandData = data;

      data.results.forEach(opt => {
        if (!shownViewImages.has(opt.image)) {
          shownViewImages.add(opt.image);
          addViewCard(opt);
        }
      });

      const cur = data.current || Math.max(shownViewImages.size, 1);
      document.getElementById('views-progress-text').textContent = `Generating view ${cur} / ${total}…`;
      document.getElementById('views-progress-bar').style.width = `${(data.count / total) * 100}%`;
      updateETA(data, total, 'views-eta');

      if (data.status === 'done') {
        clearInterval(expandPollInterval);
        clearInterval(expandTimerInterval);
        viewsProgress.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Generate 12 Views';
      }
    }, 3000);
  }

  async function regenerateViews() {
    if (!selectedOption) return;

    // Save currently selected view images to saved strip
    selectedViewImages.forEach(item => {
      const alreadySaved = savedViewImages.some(s => s.image === item.image);
      if (!alreadySaved) {
        savedViewImages.push(item);
        addSavedCard(item);
      }
    });

    if (savedViewImages.length > 0) {
      document.getElementById('saved-strip').style.display = 'block';
    }

    // Re-run 12 views generation
    selectedViewImages = [];
    updateViewActionBar();
    await generateViews();
  }

  let viewImages = [];

  function addViewCard(opt) {
    const grid = document.getElementById('views-grid');
    const card = document.createElement('div');
    card.className = 'view-card';
    const src = '/static/images/' + opt.image;
    card.innerHTML = `
      <img src="${src}" alt="${opt.style}">
      <div class="view-card-overlay">
        <div class="view-card-name">${opt.style}</div>
      </div>
      <div class="view-badge"></div>
      <div class="view-dblclick-hint">DBL</div>`;

    const idx = viewImages.length;
    viewImages.push({ src, label: opt.style });

    // シングルクリック = 選択/解除
    card.addEventListener('click', () => toggleViewSelect(card, opt, src));

    // ダブルクリック = ライトボックス拡大
    card.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      openLightbox(viewImages, idx);
    });

    grid.appendChild(card);
  }

  function toggleViewSelect(card, opt, src) {
    const isSelected = card.classList.contains('selected');
    if (isSelected) {
      // Deselect
      card.classList.remove('selected');
      selectedViewImages = selectedViewImages.filter(i => i.image !== opt.image);
    } else {
      // Select
      card.classList.add('selected');
      selectedViewImages.push({ image: opt.image, style: opt.style, src });
    }
    rebadgeViewCards();
    updateViewActionBar();
  }

  function rebadgeViewCards() {
    // Update all view-badge numbers based on current selection order
    document.querySelectorAll('.view-card').forEach(card => {
      const img = card.querySelector('img');
      if (!img) return;
      const src = img.getAttribute('src');
      const filename = src.replace('/static/images/', '');
      const idx = selectedViewImages.findIndex(i => i.image === filename);
      const badge = card.querySelector('.view-badge');
      if (badge) {
        badge.textContent = idx >= 0 ? (idx + 1) : '';
      }
    });
  }

  function updateViewActionBar() {
    const bar = document.getElementById('views-action-bar');
    const count = selectedViewImages.length;
    document.getElementById('sel-count').textContent = count;
    if (count > 0) {
      bar.classList.add('visible');
    } else {
      bar.classList.remove('visible');
    }
    document.getElementById('post-views-btn').disabled = count === 0;
  }

  function addSavedCard(item) {
    const grid = document.getElementById('saved-grid');
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.dataset.image = item.image;
    card.innerHTML = `
      <img src="${item.src}" alt="${item.style}">
      <div class="saved-card-overlay">
        <div class="saved-card-name">${item.style}</div>
      </div>
      <div class="saved-pin" id="saved-pin-${item.image}">SAVED</div>`;
    const idx = savedViewImages.length - 1;

    // シングルクリック = 選択/解除（投稿に含める）
    card.addEventListener('click', () => toggleSavedSelect(card, item));
    // ダブルクリック = ライトボックス
    card.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const allSaved = savedViewImages.map(s => ({ src: s.src, label: s.style }));
      openLightbox(allSaved, idx);
    });
    grid.appendChild(card);
  }

  function toggleSavedSelect(card, item) {
    const isSelected = card.classList.contains('selected');
    if (isSelected) {
      card.classList.remove('selected');
      selectedViewImages = selectedViewImages.filter(i => i.image !== item.image);
      const pin = document.getElementById('saved-pin-' + item.image);
      if (pin) pin.textContent = 'SAVED';
    } else {
      card.classList.add('selected');
      selectedViewImages.push(item);
      const pin = document.getElementById('saved-pin-' + item.image);
      if (pin) pin.textContent = selectedViewImages.length;
    }
    rebadgeViewCards();
    updateViewActionBar();
  }

  async function postViewsToInstagram() {
    if (selectedViewImages.length === 0) return;
    const btn = document.getElementById('post-views-btn');
    const regenBtn = document.getElementById('regen-btn');
    const msg = document.getElementById('views-result-msg');
    btn.disabled = true;
    regenBtn.disabled = true;
    btn.textContent = 'Posting…';
    msg.textContent = '';
    msg.className = 'views-result-msg';

    const caption = document.getElementById('caption-box').value;
    const imageUrls = selectedViewImages.map(i => window.location.origin + '/static/images/' + i.image);

    try {
      const res = await fetch('/api/post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: imageUrls, caption })
      });
      const data = await res.json();
      if (data.success) {
        msg.className = 'views-result-msg ok';
        msg.textContent = `✓ Posted! (${selectedViewImages.length} image${selectedViewImages.length > 1 ? 's' : ''})`;
      } else {
        msg.className = 'views-result-msg err';
        msg.textContent = '✕ ' + data.error;
      }
    } catch(e) {
      msg.className = 'views-result-msg err';
      msg.textContent = '✕ Error';
    }
    btn.disabled = false;
    regenBtn.disabled = false;
    btn.textContent = 'Post to Instagram';
  }

  async function postToInstagram() {
    if (!selectedOption) return;
    const btn = document.getElementById('post-btn');
    const msg = document.getElementById('result-msg');
    btn.disabled = true; btn.textContent = 'Posting…'; msg.textContent = '';
    const caption = document.getElementById('caption-box').value;
    const imageUrl = window.location.origin + '/static/images/' + selectedOption.image;
    try {
      const res = await fetch('/api/post', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: [imageUrl], caption })
      });
      const data = await res.json();
      if (data.success) { msg.className = 'result-msg ok'; msg.textContent = '✓ Posted!'; }
      else { msg.className = 'result-msg err'; msg.textContent = '✕ ' + data.error; }
    } catch(e) { msg.className = 'result-msg err'; msg.textContent = '✕ Error'; }
    btn.disabled = false; btn.textContent = 'Post to Instagram';
  }
</script>
</body>
</html>
